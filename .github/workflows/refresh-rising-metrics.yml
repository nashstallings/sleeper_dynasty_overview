name: Refresh Rising Metrics

on:
  schedule:
    # Tuesday 09:00 UTC — a few hours after Monday Night Football wraps up
    - cron: '0 9 * * 2'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Refresh rising_metrics.json
        run: python scripts/refresh_rising_metrics.py
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rising_metrics.json
          git diff --cached --quiet || git commit -m "Refresh rising metrics"
          git push
